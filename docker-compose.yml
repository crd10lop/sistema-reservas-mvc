services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sistema-reservas-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sistema-reservas-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - "${MSSQL_SA_PASSWORD}"
        - -Q
        - "SELECT 1"
        - -C
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks:
      - sistema-reservas-network

volumes:
  sistema-reservas-data:

networks:
  sistema-reservas-network:
    driver: bridge
